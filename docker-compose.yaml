services:
  elections:
    image: ghcr.io/jorgecarleitao/stv-app@sha256:c30a43e176a966a5d9cd612fe9389a2ee2bd7cab8446d96bc2ec8b0b16749b0a
    container_name: elections
    restart: unless-stopped
    user: "1000:1000"
    expose:
      - "8080"
    environment:
      RUST_LOG: info
    volumes:
      - elections-data:/app/data

  # https://caddyserver.com/docs/running#docker-compose
  proxy:
    image: docker.io/library/caddy:2
    container_name: proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - proxy-config:/config
      - proxy-data:/data
    environment:
      DOMAIN: ${DOMAIN}
      CADDY_EMAIL: ${ACME_CONTACT}

volumes:
  proxy-config:
  proxy-data:
  elections-data:
