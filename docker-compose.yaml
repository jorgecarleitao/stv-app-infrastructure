services:
  frontend:
    image: ghcr.io/jorgecarleitao/stv-app-frontend@sha256:b9365c38e9bc022fa112a4e777a5cd588b675ac0fb4e38901c81df1f87f535ac
    container_name: frontend
    restart: unless-stopped
    expose:
      - "80"

  elections:
    image: ghcr.io/jorgecarleitao/stv-app@sha256:70d57dbb77589b9f911afa24c18144d8d66d8e9008d5a80934f11bcb7517e118
    container_name: elections
    restart: unless-stopped
    user: "1000:1000"
    expose:
      - "8080"
    environment:
      RUST_LOG: info
    volumes:
      - /mnt/volumes/elections-data:/app/data

  # https://caddyserver.com/docs/running#docker-compose
  proxy:
    image: docker.io/library/caddy:2
    container_name: proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - proxy-config:/config
      - proxy-data:/data
    environment:
      DOMAIN: ${DOMAIN}
      CADDY_EMAIL: ${ACME_CONTACT}

volumes:
  proxy-config:
  proxy-data:
